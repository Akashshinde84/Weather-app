<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Weather App</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('weather-theme');
            const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.dataset.theme = savedTheme || preferredTheme;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="page-shell auth-page-shell">
        <nav class="navbar" aria-label="Primary">
            <a class="brand" href="/" aria-label="Weather App home">
                <span class="brand-mark" aria-hidden="true">&#127780;&#65039;</span>
                <span>Weather App</span>
            </a>
        </nav>

        <main class="auth-card glass-panel">
            <span class="eyebrow">Account recovery</span>
            <h1>Reset password</h1>
            <p class="auth-card-subtitle">Choose a new password for your account.</p>

            <form id="resetPasswordForm" class="auth-form" novalidate>
                <input type="hidden" id="resetToken" value="{{ token }}">
                <div class="auth-field">
                    <label for="resetPassword">New password</label>
                    <input id="resetPassword" type="password" minlength="8" autocomplete="new-password" required>
                </div>
                <div class="auth-field">
                    <label for="resetPasswordConfirm">Confirm password</label>
                    <input id="resetPasswordConfirm" type="password" minlength="8" autocomplete="new-password" required>
                </div>
                <button type="submit">Update password</button>
                <p id="resetPasswordMessage" class="auth-message hidden" role="status"></p>
            </form>

            <a class="text-button auth-back-link" href="/">Back to login</a>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
