<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in required - Weather App</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('weather-theme');
            const preferredTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.dataset.theme = savedTheme || preferredTheme;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="page-shell auth-page-shell">
        <main class="auth-card glass-panel">
            <span class="eyebrow">Authentication</span>
            <h1>Sign in required</h1>
            <p class="auth-card-subtitle">Please sign in to view your profile.</p>
            <a class="auth-primary-link" href="/?login=1">Go to sign in</a>
        </main>
    </div>
</body>
</html>
